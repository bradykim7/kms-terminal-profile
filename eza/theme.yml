# Nord Light — eza theme
# Designed for light terminal backgrounds (e.g. Nord Light, Belafonte Day)
# Uses Nord palette with strong contrast for readability
#
# Nord Polar Night (dark text):  #2E3440 #3B4252 #434C5E #4C566A
# Nord Snow Storm (light bg):    #D8DEE9 #E5E9F0 #ECEFF4
# Nord Frost (blues):            #8FBCBB #88C0D0 #81A1C1 #5E81AC
# Nord Aurora (accents):         #BF616A #D08770 #EBCB8B #A3BE8C #B48EAD

colourful: false

filekinds:
  normal:       {foreground: "#3B4252"}
  directory:    {foreground: "#5E81AC", is_bold: true}
  symlink:      {foreground: "#88C0D0"}
  pipe:         {foreground: "#D08770"}
  block_device: {foreground: "#D08770", is_bold: true}
  char_device:  {foreground: "#D08770"}
  socket:       {foreground: "#B48EAD"}
  special:      {foreground: "#B48EAD", is_bold: true}
  executable:   {foreground: "#A3BE8C", is_bold: true}
  mount_point:  {foreground: "#5E81AC", is_bold: true}

perms:
  user_read:         {foreground: "#A3BE8C"}
  user_write:        {foreground: "#D08770"}
  user_execute_file: {foreground: "#BF616A", is_bold: true}
  user_execute_other:{foreground: "#BF616A"}
  group_read:        {foreground: "#A3BE8C"}
  group_write:       {foreground: "#D08770"}
  group_execute:     {foreground: "#BF616A"}
  other_read:        {foreground: "#8FBCBB"}
  other_write:       {foreground: "#D08770"}
  other_execute:     {foreground: "#BF616A"}
  special_user_file: {foreground: "#B48EAD"}
  special_other:     {foreground: "#B48EAD"}
  attribute:         {foreground: "#4C566A"}

size:
  major:       {foreground: "#5E81AC", is_bold: true}
  minor:       {foreground: "#81A1C1"}
  number_byte: {foreground: "#4C566A"}
  number_kilo: {foreground: "#A3BE8C"}
  number_mega: {foreground: "#EBCB8B"}
  number_giga: {foreground: "#D08770", is_bold: true}
  number_huge: {foreground: "#BF616A", is_bold: true}
  unit_byte:   {foreground: "#4C566A"}
  unit_kilo:   {foreground: "#A3BE8C"}
  unit_mega:   {foreground: "#EBCB8B"}
  unit_giga:   {foreground: "#D08770"}
  unit_huge:   {foreground: "#BF616A"}

users:
  user_you:    {foreground: "#5E81AC", is_bold: true}
  user_root:   {foreground: "#BF616A", is_bold: true}
  user_other:  {foreground: "#4C566A"}
  group_yours: {foreground: "#81A1C1"}
  group_other: {foreground: "#4C566A"}
  group_root:  {foreground: "#BF616A"}

links:
  normal:          {foreground: "#4C566A"}
  multi_link_file: {foreground: "#88C0D0", is_bold: true}

git:
  new:        {foreground: "#A3BE8C", is_bold: true}
  modified:   {foreground: "#EBCB8B", is_bold: true}
  deleted:    {foreground: "#BF616A"}
  renamed:    {foreground: "#81A1C1"}
  typechange: {foreground: "#D08770"}
  ignored:    {foreground: "#4C566A"}
  conflicted: {foreground: "#BF616A", is_bold: true}

git_repo:
  branch_main:  {foreground: "#5E81AC", is_bold: true}
  branch_other: {foreground: "#81A1C1"}
  git_clean:    {foreground: "#A3BE8C"}
  git_dirty:    {foreground: "#BF616A", is_bold: true}

security_context:
  colon: {foreground: "#4C566A"}
  user:  {foreground: "#5E81AC"}
  role:  {foreground: "#81A1C1"}
  typ:   {foreground: "#8FBCBB"}
  range: {foreground: "#4C566A"}

file_type:
  image:      {foreground: "#B48EAD"}
  video:      {foreground: "#B48EAD", is_bold: true}
  music:      {foreground: "#88C0D0"}
  lossless:   {foreground: "#88C0D0", is_bold: true}
  crypto:     {foreground: "#A3BE8C"}
  document:   {foreground: "#5E81AC"}
  compressed: {foreground: "#BF616A"}
  temp:       {foreground: "#4C566A", is_italic: true}
  compiled:   {foreground: "#D08770"}
  build:      {foreground: "#EBCB8B"}
  source:     {foreground: "#81A1C1"}

punctuation:         {foreground: "#4C566A"}
date:                {foreground: "#5E81AC"}
inode:               {foreground: "#4C566A"}
blocks:              {foreground: "#4C566A"}
header:              {foreground: "#2E3440", is_bold: true}
octal:               {foreground: "#81A1C1"}
flags:               {foreground: "#88C0D0"}
symlink_path:        {foreground: "#88C0D0", is_italic: true}
control_char:        {foreground: "#BF616A"}
broken_symlink:      {foreground: "#BF616A", is_bold: true}
broken_path_overlay: {foreground: "#BF616A", is_italic: true}

filenames:
  # Custom filename-based overrides
  # Cargo.toml: {icon: {glyph: 🦀}}

extensions:
  # Custom extension-based overrides
  # rs: {filename: {foreground: "#BF616A"}, icon: {glyph: 🦀}}
